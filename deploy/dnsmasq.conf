# ══════════════════════════════════════════════════════════════════════════
# dnsmasq.conf — WiFi-Media DHCP + DNS + Captive Portal
# ══════════════════════════════════════════════════════════════════════════

# ── فقط روی کارت وایرلس listen کن ────────────────────────────────────────
interface=__WIFI_IFACE__
bind-interfaces
except-interface=lo

# ── DHCP ──────────────────────────────────────────────────────────────────
# محدوده IP برای کلاینت‌ها
dhcp-range=__DHCP_START__,__DHCP_END__,255.255.255.0,12h

# Gateway (خود سرور)
dhcp-option=option:router,__SERVER_IP__

# DNS server (خود سرور)
dhcp-option=option:dns-server,__SERVER_IP__

# نام شبکه محلی
domain=wifi.local
local=/wifi.local/

# ── DNS Captive Portal ────────────────────────────────────────────────────
# همه دامنه‌ها به سرور محلی redirect شوند
# این اصل Captive Portal است
address=/#/__SERVER_IP__

# سرور DNS خارجی (اگر اینترنت داری)
# server=8.8.8.8
# server=1.1.1.1

# بدون DNS forwarding به خارج (محیط کاملاً آفلاین)
no-resolv

# ── Hostnames محلی ────────────────────────────────────────────────────────
address=/wifi.local/__SERVER_IP__
address=/portal.local/__SERVER_IP__
address=/media.local/__SERVER_IP__

# ── بهینه‌سازی ────────────────────────────────────────────────────────────
# سرعت DNS cache
cache-size=1000
# جلوگیری از لاگ زیاد
log-queries=no
# DHCP lease database
dhcp-leasefile=/var/lib/dnsmasq/dnsmasq.leases

# ── DHCP hostnames ────────────────────────────────────────────────────────
# سرور خودش
dhcp-host=__SERVER_IP__,wifi-media-server,infinite

# ── مدت lease ────────────────────────────────────────────────────────────
# کوتاه‌تر = آزاد شدن سریع‌تر IP (برای محیط‌های پرتردد مثل قطار)
# dhcp-range=__DHCP_START__,__DHCP_END__,1h   # 1 ساعته برای قطار/اتوبوس
# dhcp-range=__DHCP_START__,__DHCP_END__,24h  # 24 ساعته برای هتل
