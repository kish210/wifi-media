# ══════════════════════════════════════════════════════════════════════════
# nginx-portal.conf — WiFi-Media Captive Portal
# تمام ترافیک HTTP به WiFi-Media redirect می‌شود
# ══════════════════════════════════════════════════════════════════════════

# ── Rate limiting (محافظت در برابر spam) ──────────────────────────────────
limit_req_zone $binary_remote_addr zone=portal:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ══════════════════════════════════════════════════════════════════════════
# سرور اصلی Captive Portal — port 80
# ══════════════════════════════════════════════════════════════════════════
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Captive Portal Detection Endpoints ──────────────────────────────
    # هوشمند: دستگاه‌ها با request به این URLها متوجه می‌شوند portal وجود دارد

    # Android / Chrome OS
    location = /generate_204 {
        return 302 http://__SERVER_IP__/;
    }
    location = /gen_204 {
        return 302 http://__SERVER_IP__/;
    }
    location ~ ^/connectivitycheck {
        return 302 http://__SERVER_IP__/;
    }

    # Apple iOS / macOS
    location = /hotspot-detect.html {
        return 302 http://__SERVER_IP__/;
    }
    location = /library/test/success.html {
        return 302 http://__SERVER_IP__/;
    }
    location ~ ^/captive\.apple\.com {
        return 302 http://__SERVER_IP__/;
    }

    # Windows / Microsoft
    location = /connecttest.txt {
        add_header Content-Type "text/plain";
        return 200 "Microsoft Connect Test";
    }
    location = /redirect {
        return 302 http://__SERVER_IP__/;
    }
    location ~ ^/ncsi\.txt {
        add_header Content-Type "text/plain";
        return 200 "Microsoft NCSI";
    }

    # Firefox
    location = /success.txt {
        add_header Content-Type "text/plain";
        return 200 "success\n";
    }
    location ~ ^/canonical\.html {
        return 302 http://__SERVER_IP__/;
    }

    # Huawei / Samsung
    location ~ ^/generate\.204 {
        return 302 http://__SERVER_IP__/;
    }

    # ── Proxy به WiFi-Media App ──────────────────────────────────────────
    location / {
        limit_req zone=portal burst=20 nodelay;
        limit_conn addr 20;

        proxy_pass http://127.0.0.1:8181;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Cache برای فایل‌های استاتیک
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # ── API Backend ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── WebSocket (Socket.io) ────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── TVHeadend Stream Proxy ────────────────────────────────────────────
    location /stream/ {
        proxy_pass http://127.0.0.1:9981;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # ── Static Assets Cache ───────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|mp4|mkv|mp3)$ {
        proxy_pass http://127.0.0.1:8181;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Security Headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
}
