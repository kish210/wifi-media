# ══════════════════════════════════════════════════════════════════════════
# hostapd.conf — WiFi-Media Access Point
# Ubuntu Server 22.04 / Raspberry Pi OS
# ══════════════════════════════════════════════════════════════════════════

# ── کارت شبکه ────────────────────────────────────────────────────────────
interface=wlan0
driver=nl80211

# ── تنظیمات WiFi ──────────────────────────────────────────────────────────
ssid=WiFi-Media
# باند: g = 2.4GHz (بهتر برای coverage)  |  a = 5GHz (سریع‌تر)
hw_mode=g
channel=6
# برای 5GHz: hw_mode=a  و  channel=36 یا 149

# ── 802.11n (سرعت بالاتر) ────────────────────────────────────────────────
ieee80211n=1
wmm_enabled=1
ht_capab=[HT40+][SHORT-GI-20][SHORT-GI-40][DSSS_CCK-40]

# ── 802.11ac — فقط برای 5GHz ──────────────────────────────────────────────
# ieee80211ac=1
# vht_capab=[MAX-MPDU-11454][SHORT-GI-80]

# ── امنیت WPA2 ───────────────────────────────────────────────────────────
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=wifimedia2024
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP CCMP
rsn_pairwise=CCMP

# ── محدودیت‌ها ────────────────────────────────────────────────────────────
# حداکثر کاربر همزمان
max_num_sta=100
# قطع کاربران غیرفعال (ثانیه)
ap_max_inactivity=1800

# ── لاگ (0=کمترین، 4=بیشترین) ────────────────────────────────────────────
logger_syslog=-1
logger_syslog_level=1
logger_stdout=-1
logger_stdout_level=1

# ── Country Code ──────────────────────────────────────────────────────────
# کد کشور خود را وارد کنید (IR = ایران، SA = عربستان، US = آمریکا)
country_code=IR
ieee80211d=1
ieee80211h=1
